x-redash-service: &redash-service
  image: redash/redash:latest
  depends_on:
    - postgres
    - redis
  env_file:
    - .env
  restart: unless-stopped

services:
  server:
    <<: *redash-service
    command: server
    ports:
      - "127.0.0.1:5000:5000"
    environment:
      REDASH_WEB_WORKERS: 4

  scheduler:
    <<: *redash-service
    command: scheduler

  scheduled_worker:
    <<: *redash-service
    command: worker
    environment:
      QUEUES: scheduled_queries,schemas
      WORKERS_COUNT: 1

  adhoc_worker:
    <<: *redash-service
    command: worker
    environment:
      QUEUES: queries
      WORKERS_COUNT: 2

  worker:
    <<: *redash-service
    command: worker
    environment:
      QUEUES: periodic,emails,default
      WORKERS_COUNT: 1

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  postgres:
    image: pgautoupgrade/pgautoupgrade:17-alpine
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - server

volumes:
  postgres_data:
